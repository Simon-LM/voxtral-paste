<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CC66;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="morphGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00EE77;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CC66;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleglow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background carré -->
  <rect width="400" height="400" rx="72" fill="#080808"/>

  <!-- Dot grid -->
  <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="9" cy="9" r="0.7" fill="#181818"/>
  </pattern>
  <rect width="400" height="400" rx="72" fill="url(#dots)"/>

  <!-- ===================== -->
  <!-- ICON: wave → text     -->
  <!-- Centré verticalement sur y=155, x: 30 à 370 -->
  <!-- ===================== -->

  <!-- === LEFT: onde sonore chaotique === -->
  <g filter="url(#glow)">
    <rect x="30"  y="115" width="11" height="80"  rx="5.5" fill="url(#morphGrad)"/>
    <rect x="47"  y="97"  width="11" height="116" rx="5.5" fill="url(#morphGrad)"/>
    <rect x="64"  y="130" width="11" height="50"  rx="5.5" fill="url(#morphGrad)"/>
    <rect x="81"  y="82"  width="11" height="146" rx="5.5" fill="url(#morphGrad)"/>
    <rect x="98"  y="110" width="11" height="90"  rx="5.5" fill="url(#morphGrad)"/>
    <rect x="115" y="90"  width="11" height="130" rx="5.5" fill="url(#morphGrad)"/>
    <rect x="132" y="122" width="11" height="66"  rx="5.5" fill="url(#morphGrad)"/>
    <rect x="149" y="100" width="11" height="110" rx="5.5" fill="url(#morphGrad)"/>
  </g>

  <!-- === TRANSITION: barres qui s'aplatissent === -->
  <g filter="url(#subtleglow)">
    <rect x="168" y="107" width="11" height="96"  rx="5.5" fill="url(#morphGrad)" opacity="0.95"/>
    <rect x="185" y="118" width="11" height="74"  rx="5.5" fill="url(#morphGrad)" opacity="0.88"/>
    <rect x="202" y="132" width="11" height="46"  rx="5.5" fill="url(#morphGrad)" opacity="0.80"/>
    <rect x="219" y="142" width="11" height="26"  rx="5.5" fill="url(#morphGrad)" opacity="0.72"/>
    <rect x="236" y="149" width="11" height="12"  rx="5.5" fill="url(#morphGrad)" opacity="0.65"/>
  </g>

  <!-- === RIGHT: lignes de texte propres === -->
  <g filter="url(#subtleglow)">
    <rect x="258" y="118" width="112" height="11" rx="5.5" fill="url(#morphGrad)" opacity="0.95"/>
    <rect x="258" y="143" width="112" height="11" rx="5.5" fill="url(#morphGrad)" opacity="0.85"/>
    <rect x="258" y="168" width="112" height="11" rx="5.5" fill="url(#morphGrad)" opacity="0.75"/>
    <rect x="258" y="193" width="70"  height="11" rx="5.5" fill="url(#morphGrad)" opacity="0.50"/>
  </g>

  <!-- Séparateur pointillé discret -->
  <line x1="250" y1="78" x2="250" y2="232"
        stroke="#00FF88" stroke-width="1" opacity="0.10" stroke-dasharray="4 5"/>

  <!-- ===================== -->
  <!-- WORDMARK              -->
  <!-- ===================== -->
  <text x="204" y="300"
        font-family="'Courier New', monospace"
        font-size="45"
        font-weight="700"
        fill="url(#greenGrad)"
        text-anchor="middle"
        letter-spacing="2"
        textLength="345"
        lengthAdjust="spacing"        
        filter="url(#subtleglow)">VoxRefiner</text>

  <!-- Tagline pleine largeur -->
  <text x="204" y="330"
        font-family="'Courier New', monospace"
        font-size="15"
        font-weight="600"
        fill="#00EE77"
        text-anchor="middle"
        letter-spacing="6.4"
        opacity="0.85">SPEAK · REFINE · PASTE</text>

</svg>
